<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#172033" />
  <title>Inventory App</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --navy:#172033; --gold:#c89b3c; --cream:#fff9ee; --white:#fff;
      --muted:#6b7280; --green:#dcfce7; --red:#fee2e2; --border:#d1d5db;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:#f5f1e8;color:#1f2937}
    header{background:var(--navy);color:white;padding:18px;text-align:center}
    header h1{margin:0;font-size:24px}
    .wrap{max-width:820px;margin:auto;padding:16px}
    .card{background:white;border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:0 6px 20px rgba(0,0,0,.08)}
    .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
    .tab{border:0;padding:12px;border-radius:10px;background:#e5e7eb;font-weight:700;cursor:pointer}
    .tab.active{background:var(--gold);color:white}
    label{display:block;font-weight:700;margin-top:12px}
    input,select,textarea{width:100%;padding:12px;margin-top:6px;border:1px solid var(--border);border-radius:10px;font-size:16px}
    textarea{min-height:78px}
    button.primary,button.secondary{width:100%;padding:14px;margin-top:16px;border:0;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
    button.primary{background:var(--gold);color:white}
    button.secondary{background:var(--navy);color:white}
    .hidden{display:none}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .status{margin-top:12px;padding:10px;border-radius:8px;display:none}
    .ok{display:block;background:var(--green);color:#166534}
    .bad{display:block;background:var(--red);color:#991b1b}
    .product{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #eee}
    .product img{width:72px;height:72px;object-fit:cover;border-radius:10px;background:#eee}
    .muted{color:var(--muted);font-size:14px}
    .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .kpi{background:var(--cream);padding:16px;border-radius:12px;text-align:center}
    .kpi strong{display:block;font-size:24px;margin-top:4px}
    @media(max-width:650px){.grid,.tabs,.kpis{grid-template-columns:1fr 1fr}}
    @media(max-width:430px){.grid,.tabs,.kpis{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <h1>Inventory App</h1>
  <div>Administrator login</div>
</header>

<div class="wrap">
  <div id="authCard" class="card">
    <h2>Administrator Login</h2>
    <label>Email</label>
    <input id="email" type="email" placeholder="your admin email">
    <label>Password</label>
    <input id="password" type="password" placeholder="Create or enter your password">
    <button class="primary" onclick="signIn()">Sign In</button>
    <button class="secondary" onclick="signUp()">Create Admin Account</button>
    <div id="authStatus" class="status"></div>
  </div>

  <div id="app" class="hidden">
    <div class="tabs">
      <button class="tab active" onclick="showTab('dashboard',this)">Dashboard</button>
      <button class="tab" onclick="showTab('transaction',this)">Stock In/Out</button>
      <button class="tab" onclick="showTab('product',this)">Add Product</button>
      <button class="tab" onclick="showTab('inventory',this)">Inventory</button>
    </div>

    <section id="dashboard" class="card">
      <h2>Dashboard</h2>
      <div class="kpis">
        <div class="kpi">Products<strong id="kpiProducts">0</strong></div>
        <div class="kpi">Total Units<strong id="kpiUnits">0</strong></div>
        <div class="kpi">Low Stock<strong id="kpiLow">0</strong></div>
      </div>
      <button class="secondary" onclick="loadDashboard()">Refresh Dashboard</button>
      <button class="secondary" onclick="exportCSV()">Export Inventory to CSV</button>
    </section>

    <section id="transaction" class="card hidden">
      <h2>Stock Transaction</h2>
      <label>Transaction Type</label>
      <select id="txType"><option value="IN">Stock In</option><option value="OUT">Stock Out</option></select>
      <label>Product</label>
      <select id="txProduct"></select>
      <div class="grid">
        <div><label>Quantity</label><input id="txQty" type="number" min="1"></div>
        <div><label>Price / Unit Cost</label><input id="txPrice" type="number" min="0" step="0.01"></div>
      </div>
      <label>Supplier / Customer</label><input id="txParty">
      <label>Reference</label><input id="txReference">
      <label>Notes</label><textarea id="txNotes"></textarea>
      <button class="primary" onclick="saveTransaction()">Save Transaction</button>
      <div id="txStatus" class="status"></div>
    </section>

    <section id="product" class="card hidden">
      <h2>Add Product</h2>
      <label>Product Image</label>
      <input id="productImage" type="file" accept="image/*" capture="environment">
      <label>SKU</label><input id="sku" placeholder="ST-KURTI-BLK-M">
      <label>Product Name</label><input id="productName">
      <div class="grid">
        <div><label>Category</label><input id="category"></div>
        <div><label>Colour</label><input id="colour"></div>
      </div>
      <div class="grid">
        <div><label>Size</label><input id="size"></div>
        <div><label>Opening Stock</label><input id="openingStock" type="number" min="0" value="0"></div>
      </div>
      <div class="grid">
        <div><label>Cost Price</label><input id="costPrice" type="number" step="0.01"></div>
        <div><label>Selling Price</label><input id="sellingPrice" type="number" step="0.01"></div>
      </div>
      <label>Reorder Level</label><input id="reorderLevel" type="number" min="0" value="5">
      <button class="primary" onclick="saveProduct()">Save Product</button>
      <div id="productStatus" class="status"></div>
    </section>

    <section id="inventory" class="card hidden">
      <h2>Live Inventory</h2>
      <button class="secondary" onclick="loadInventory()">Refresh Inventory</button>
      <div id="inventoryList"></div>
    </section>

    <button class="secondary" onclick="signOut()">Sign Out</button>
  </div>
</div>

<script>
// Replace these values with your Supabase project settings before deploying.
const SUPABASE_URL = "PASTE_YOUR_SUPABASE_URL";
const SUPABASE_ANON_KEY = "PASTE_YOUR_SUPABASE_ANON_KEY";
const ADMIN_EMAIL = "admin@yourdomain.com";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function status(id,msg,ok=true){
  const el=document.getElementById(id);
  el.className="status "+(ok?"ok":"bad");
  el.textContent=msg;
}

async function signUp(){
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value;
  if(email!==ADMIN_EMAIL) return status("authStatus","Use the approved admin email.",false);
  const {error}=await sb.auth.signUp({email,password});
  if(error) return status("authStatus",error.message,false);
  status("authStatus","Account created. Check your email if confirmation is enabled.");
}

async function signIn(){
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value;
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error) return status("authStatus",error.message,false);
  document.getElementById("authCard").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  await Promise.all([loadProducts(),loadDashboard()]);
}

async function signOut(){await sb.auth.signOut();location.reload()}

function showTab(id,btn){
  ["dashboard","transaction","product","inventory"].forEach(x=>document.getElementById(x).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  btn.classList.add("active");
  if(id==="inventory") loadInventory();
  if(id==="dashboard") loadDashboard();
}

async function uploadImage(file,sku){
  if(!file) return null;
  const ext=(file.name.split(".").pop()||"jpg").toLowerCase();
  const path=`${sku}-${Date.now()}.${ext}`;
  const {error}=await sb.storage.from("product-images").upload(path,file);
  if(error) throw error;
  return sb.storage.from("product-images").getPublicUrl(path).data.publicUrl;
}

async function saveProduct(){
  try{
    const sku=document.getElementById("sku").value.trim();
    const name=document.getElementById("productName").value.trim();
    if(!sku||!name) throw new Error("SKU and Product Name are required.");
    const imageUrl=await uploadImage(document.getElementById("productImage").files[0],sku);
    const row={
      sku,name,
      category:document.getElementById("category").value.trim(),
      colour:document.getElementById("colour").value.trim(),
      size:document.getElementById("size").value.trim(),
      opening_stock:Number(document.getElementById("openingStock").value||0),
      cost_price:Number(document.getElementById("costPrice").value||0),
      selling_price:Number(document.getElementById("sellingPrice").value||0),
      reorder_level:Number(document.getElementById("reorderLevel").value||5),
      image_url:imageUrl
    };
    const {error}=await sb.from("products").insert(row);
    if(error) throw error;
    status("productStatus","Product saved successfully.");
    await Promise.all([loadProducts(),loadDashboard()]);
  }catch(e){status("productStatus",e.message,false)}
}

async function loadProducts(){
  const {data,error}=await sb.from("products").select("id,sku,name").order("name");
  if(error) return;
  const s=document.getElementById("txProduct");s.innerHTML="";
  (data||[]).forEach(p=>{
    const o=document.createElement("option");o.value=p.id;o.textContent=`${p.name} — ${p.sku}`;s.appendChild(o);
  });
}

async function saveTransaction(){
  try{
    const productId=document.getElementById("txProduct").value;
    const qty=Number(document.getElementById("txQty").value);
    if(!productId||qty<=0) throw new Error("Select a product and enter quantity.");
    const row={
      product_id:productId,
      transaction_type:document.getElementById("txType").value,
      quantity:qty,
      unit_price:Number(document.getElementById("txPrice").value||0),
      party:document.getElementById("txParty").value.trim(),
      reference:document.getElementById("txReference").value.trim(),
      notes:document.getElementById("txNotes").value.trim()
    };
    const {error}=await sb.from("stock_transactions").insert(row);
    if(error) throw error;
    status("txStatus","Transaction saved.");
    document.getElementById("txQty").value="";
    document.getElementById("txNotes").value="";
    await loadDashboard();
  }catch(e){status("txStatus",e.message,false)}
}

async function loadInventory(){
  const {data,error}=await sb.from("inventory_view").select("*").order("name");
  const list=document.getElementById("inventoryList");
  if(error){list.innerHTML=`<p>${error.message}</p>`;return}
  list.innerHTML="";
  (data||[]).forEach(p=>{
    const d=document.createElement("div");d.className="product";
    d.innerHTML=`<img src="${p.image_url||""}" alt="">
      <div><strong>${p.name}</strong>
      <div class="muted">${p.sku} · ${p.colour||""} · ${p.size||""}</div>
      <div>Current stock: <strong>${p.current_stock}</strong></div></div>`;
    list.appendChild(d);
  });
}

async function loadDashboard(){
  const {data,error}=await sb.from("inventory_view").select("current_stock,reorder_level");
  if(error) return;
  document.getElementById("kpiProducts").textContent=(data||[]).length;
  document.getElementById("kpiUnits").textContent=(data||[]).reduce((a,p)=>a+Number(p.current_stock||0),0);
  document.getElementById("kpiLow").textContent=(data||[]).filter(p=>Number(p.current_stock)<=Number(p.reorder_level)).length;
}

async function exportCSV(){
  const {data,error}=await sb.from("inventory_view").select("*").order("name");
  if(error) return alert(error.message);
  const rows=data||[];
  if(!rows.length) return alert("No inventory data to export.");
  const headers=Object.keys(rows[0]);
  const csv=[headers.join(",")].concat(rows.map(r=>headers.map(h=>`"${String(r[h]??"").replace(/"/g,'""')}"`).join(","))).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="Sufi_Thread_Inventory.csv";a.click();
}

sb.auth.getSession().then(async({data})=>{
  if(data.session){
    document.getElementById("authCard").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    await Promise.all([loadProducts(),loadDashboard()]);
  }
});
if("serviceWorker" in navigator) navigator.serviceWorker.register("service-worker.js");
</script>
</body>
</html>
